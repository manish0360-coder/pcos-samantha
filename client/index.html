<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PCOS - Samantha Perception</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: #1e1e1e;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        h1 {
            margin-bottom: 10px;
        }
        #status {
            margin-bottom: 20px;
            padding: 8px 16px;
            background-color: #333;
            border-radius: 4px;
            font-family: monospace;
        }
        .error {
            color: #ff6b6b;
        }
        .success {
            color: #51cf66;
        }
        video {
            background-color: #000;
            border: 2px solid #333;
            border-radius: 8px;
            width: 640px;
            max-width: 90vw;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }
    </style>
</head>
<body>

    <h1>PCOS Perception Eye</h1>
    
    <div id="status">Requesting camera access...</div>
    
    <!-- autoplay and playsinline are required for the stream to render immediately -->
    <video
        id="webcam"
        autoplay
        playsinline
        aria-label="Live webcam feed">
    </video>

    <script src="app.js"></script>
</body>
</html>
