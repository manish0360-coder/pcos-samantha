<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PCOS - Samantha Perception</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: #1e1e1e;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        h1 { margin-bottom: 10px; }
        #status {
            margin-bottom: 20px;
            padding: 8px 16px;
            background-color: #333;
            border-radius: 4px;
            font-family: monospace;
        }
        .error { color: #ff6b6b; }
        .success { color: #51cf66; }
        video {
            background-color: #000;
            border: 2px solid #333;
            border-radius: 8px;
            width: 640px;
            max-width: 90vw;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }
        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }
        button {
            padding: 10px 24px;
            font-size: 16px;
            font-weight: bold;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        button:hover { background-color: #0056b3; }
        #memory-btn { background-color: #6f42c1; }
        #memory-btn:hover { background-color: #5936a2; }
        #summarize-btn { background-color: #28a745; }
        #summarize-btn:hover { background-color: #218838; }
        #capture-canvas { display: none; }
    </style>
</head>
<body>

    <h1>PCOS Perception Eye</h1>
    <div id="status">Requesting camera access...</div>
    <video id="webcam" autoplay playsinline></video>

    <div class="button-group">
        <button id="capture-btn">Capture Frame</button>
        <button id="memory-btn">Show Recent Memory</button>
        <button id="summarize-btn">Summarize Memory</button>
    </div>

    <canvas id="capture-canvas"></canvas>
    <script src="/socket.io/socket.io.js"></script>
    <script src="app.js"></script>
</body>
</html>
